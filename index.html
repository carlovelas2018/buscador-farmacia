<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Buscador de Medicamentos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <link href="css/estilos.css" rel="stylesheet">

</head>

<body>

    <!-- Encabezado -->

    <nav class="navbar navbar-dark bg-primary shadow">

        <div class="container">

            <span class="navbar-brand fs-3">

                💊 FarmaBuscador

            </span>

        </div>

    </nav>


    <div class="container mt-4">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card shadow">

                    <div class="card-body">

                        <h4 class="mb-3">
                            Buscar medicamento
                        </h4>

                        <div class="input-group input-group-lg">

                            <span class="input-group-text">

                                <i class="bi bi-search"></i>

                            </span>

                            <input
                                id="txtBuscar"
                                class="form-control"
                                type="text"
                                placeholder="Escriba el nombre del medicamento">

                        </div>

                        <small class="text-muted">

                            Escriba al menos 3 letras.

                        </small>

                    </div>

                </div>

            </div>

        </div>


        <div class="row justify-content-center mt-4">

            <div class="col-lg-8">

                <h5>

    			Resultados

    			<span
       			 id="cantidadResultados"
        			class="badge bg-primary ms-2">

        		0

    		</span>

		</h5>

                <div class="card shadow mt-4">

    <div class="card-header d-flex justify-content-between align-items-center">

        <strong>Resultados</strong>

        <span
            id="cantidadResultados"
            class="badge bg-primary">
            0
        </span>

    </div>

    <div class="table-responsive" style="max-height:500px;overflow:auto;">

        <table class="table table-hover align-middle mb-0">

            <thead class="table-light sticky-top">

                	<tr>

        	            <th style="width:50px;"></th>

	                    <th>Descripción</th>

                	    <th>Presentación</th>

        	            <th>Laboratorio</th>

	                </tr>

        	    </thead>

	            <tbody id="contenedorResultados">

        	    </tbody>

	        </table>

	    </div>

	</div>

		<div class="card shadow mt-4">

		    <div class="card-header">

		        <strong>

		            🛒 Productos seleccionados

		        </strong>

		    </div>

		    <div
		        id="contenedorSeleccionados"
		        class="card-body">

		        No hay productos seleccionados.

		    </div>

		</div>
            </div>

        </div>

    </div>


    <!-- Barra inferior -->

    <div class="footer-fixed shadow-lg">

        <div class="container">

            <div class="row align-items-center">

                <div class="col">

                    <strong>

                        Seleccionados:

                    </strong>

                    <span id="cantidadSeleccionados">

                        0

                    </span>

                </div>

                <div class="col text-end">

                    <button
        		id="btnLimpiar"
        		class="btn btn-outline-secondary">

        		Limpiar

    		    </button>

    		    <button
        		id="btnCopiar"
        		class="btn btn-primary">

        		Copiar lista

                    </button>

                </div>

            </div>

        </div>

    </div>


<script src="js/datos.js"></script>
<script src="js/ui.js"></script>
<script src="js/buscador.js"></script>
<script src="js/app.js"></script>

</body>

</html>
